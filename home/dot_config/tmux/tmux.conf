# Remap prefix from 'C-b' to 'C-Space'
unbind-key C-b                  # remove bind for C-b
set-option -g prefix C-Space
bind-key C-Space send-prefix

# reload config file
bind-key -N "Reload ~/.tmux.conf" r source-file ~/.tmux.conf \; display-message "Reloaded!"

# Start window numbering at 1
set -g base-index 1

# Renumber remaining windows when closing any windows
set-option -g renumber-windows on

# Set the base index for panes to 1
set -g pane-base-index 1

# Turn off auto rename of windows
set-option -g allow-rename off

# disable wait for ESC and keycodes
set -sg escape-time 0

# Set vi as the default editor
set -g status-keys vi
# Set vi-mode
set-window-option -g mode-keys vi
# begin selection in copy-mode like Vim
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle \; send -X begin-selection
# yank selection in copy-mode like Vim
#bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi y send-keys -X copy-selection
# comment the preceding line and uncomment the following to yank to X clipboard
# bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -in -selection clipboard

# Bind Ctrl+o to save buffer with filename prompt and show confirmation
bind-key -N "Save tmux pane buffer to file" C-o command-prompt -p "Save buffer as:" \
"run-shell 'cd ~ && tmux capture-pane -S - && tmux save-buffer \"%1\" && tmux display-message \"Tmux buffer saved to %1\"'"

# split pane binds (from on tmux-pain-control)
#Split panes horizontally
bind-key -N "Split window horizontally" | split-window -h -c "#{pane_current_path}"
#Split panes fully horizontally (need to escape '\')
bind-key -N "Split window fully horizontally" \\ split-window -fh -c "#{pane_current_path}"
#Split panes vertically
bind-key -N "Split window vertically" - split-window -v -c "#{pane_current_path}"
#Split panes fully vertically
bind-key -N "Split window fully vertically" _ split-window -fv -c "#{pane_current_path}"

# Open new window in same path
bind-key -N "Open new window in same path" c new-window -c "#{pane_current_path}"

# Synchronize pane: type to all panes in same window
bind-key -N "Synchronize pane: type to all panes in same window" C-x set-window-option synchronize-pane
# Disable pane: disable all inputs into pane
bind-key -N "Disable pane: disable all inputs into pane" C-d select-pane -d
# Enable pane: enable inputs into pane
bind-key -N "Enable pane: enable inputs into pane" C-e select-pane -e

# Clear screen and history in pane: asks for confirmation
bind-key -N "Clear screen and history in pane: ask for confirmation" C-k confirm -p "clear screen and history?" \
    "send-keys -R; clear-history; send-keys C-l"

# Order sessions based on "index", "name", or "time"
bind-key -N "list sessions (based on \"index\", \"name\", or \"time\")" s choose-tree -sZ -O name

# set clipboard on globally for vim to copy out (before tmux 2.6)
# https://github.com/tmux/tmux/wiki/Clipboard#quick-summary
set -g set-clipboard on
# set clipboard on globally for vim to copy out (tmux 2.6+)
#set -g set-clipboard external
# set clipboard on globally for vim to copy out (tmux 3.3a+)
#set -g allow-passthrough on

# Turn on better mouse/drag support
set -g mouse on
# Disable "release mouse drag to copy and exit copy-mode",
# ref: https://github.com/tmux/tmux/issues/140
unbind-key -T copy-mode-vi MouseDragEnd1Pane
# Since MouseDragEnd1Pane neither exit copy-mode nor clear selection now,
# let single click do selection clearing for us.
bind-key -T copy-mode-vi MouseDown1Pane select-pane\; send-keys -X clear-selection
# This line changes the default binding of MouseDrag1Pane, the only difference
# is we use `copy-mode -eM` instead of `copy-mode -M`, so that WheelDownPane
# can trigger copy-mode to exit when copy-mode is entered by MouseDrag1Pane
bind -n MouseDrag1Pane if -Ft= '#{mouse_any_flag}' 'if -Ft= \"#{pane_in_mode}\" \"copy-mode -eM\" \"send-keys -M\"' 'copy-mode -eM'

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
# set to false if restore crashed
# then check ~/.tmux/resurrect/last
set -g @resurrect-processes 'false'
set -g @resurrect-capture-pane-contents 'on'
set -g @plugin 'tmux-plugins/tmux-continuum'
#set -g @continuum-restore 'on'
set -g @plugin 'christoomey/vim-tmux-navigator'
# Restore Clear Screen (C-l) with vim-tmux-navigator installed
bind C-l send-keys 'C-l'
set -g @plugin 'RyanMillerC/better-vim-tmux-resizer'
# Enable better mouse scroll support in Tmux
set -g @plugin 'nhdaly/tmux-better-mouse-mode'
set -g @scroll-without-changing-panes "on"
set -g @emulate-scroll-for-no-mouse-alternate-buffer "on"
# Enable copy to clipboard, may not need for iTerm2 on MacOS
#set -g @plugin 'tmux-plugins/tmux-yank'

# Other examples:
# set -g @plugin 'github_username/plugin_name'
# set -g @plugin 'git@github.com:user/plugin'
# set -g @plugin 'git@bitbucket.com:user/plugin'

# Alias system to create macro commands in tmux that types words
set-option -ag command-alias "alias=show-options -g command-alias"

# Actual passwords will be saved locally in ~/.tmux.conf.local
# Machine-specific overrides (never committed — see .chezmoiignore)
# use 'if-shell' for pre-3.2 tmux
if-shell "test -f ~/.tmux.conf.local" "source-file ~/.tmux.conf.local"

# set-option -ag command-alias "be=run-shell '\
# tmux send-keys \"test\" C-m;\
# sleep 1;\
# tmux send-keys \"asdf1234\" C-m'"

# set-option -ag command-alias "bn=run-shell '\
# tmux send-keys \"username\" C-m;\
# sleep 1;\
# tmux send-keys \"password\" C-m'"

# Automatically install tmux plugin manager if not installed
setenv -g TMUX_PLUGIN_MANAGER_PATH "$HOME/.tmux/plugins/"
if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
